<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clock</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <main class="clock-app">

        <div id="back-btn">
            <a href="/index.html" title="Back to Project Hub"><button class="back" type="button"> Back to Project
                    Hub</button></a>
        </div>

        <section class="clock-card">

            <!--Theme Toggle-->
            <button id="toggle-btn" class="theme-toggle">🌙</button>

            <!--Analog Info-->
            <div class="clock">
                <div class="markers"></div>
                <div id="hour" class="needle hour"></div>
                <div id="minute" class="needle minute"></div>
                <div id="second" class="needle second"></div>
                <div class="center-dot"></div>
            </div>

            <!--Digital Info-->
            <div class="info">
                <p id="current-time" class="time"></p>
                <p id="current-date" class="date"></p>
            </div>
        </section>
    </main>

    <script src="js.js"></script>
</body>

</html>
